name: Publish

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: publish
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    environment: release
    env:
      ABUILD_PRIVATE_KEY: ${{ secrets.ABUILD_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Build, install, and test
        run: |
          version=$(sed -n 's/^pkgver=//p' packages/gnupg/APKBUILD)
          revision=$(sed -n 's/^pkgrel=//p' packages/gnupg/APKBUILD)
          package_tag="$version-r$revision"
          mkdir -p "$RUNNER_TEMP/repository"
          docker run --rm \
            -e ABUILD_PRIVATE_KEY \
            -e PACKAGE_TAG="$package_tag" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v "$RUNNER_TEMP/repository:/repository" \
            -w /workspace \
            alpine:edge sh -euxc '
              apk add alpine-sdk
              adduser -D builder
              addgroup builder abuild
              mkdir -p /etc/doas.d /home/builder/.config/abuild
              echo "permit nopass builder as root" > /etc/doas.d/builder.conf
              printf "%s\n" "$ABUILD_PRIVATE_KEY" > /home/builder/.config/abuild/apkbuilds.rsa
              cp keys/apkbuilds.rsa.pub /home/builder/.config/abuild/apkbuilds.rsa.pub
              cp keys/apkbuilds.rsa.pub /etc/apk/keys/
              echo "PACKAGER_PRIVKEY=/home/builder/.config/abuild/apkbuilds.rsa" > /home/builder/.config/abuild/abuild.conf
              chmod 600 /home/builder/.config/abuild/apkbuilds.rsa
              chown -R builder:builder /home/builder/.config /repository /workspace
              su builder -c "cd /workspace/packages/gnupg && REPODEST=/repository abuild -r"
              apk add --repository /repository/packages "gnupg=$PACKAGE_TAG"
              scripts/test-package.sh "${PACKAGE_TAG%-r*}"
            '
      - uses: actions/upload-artifact@v4
        with:
          name: repository-${{ matrix.arch }}
          path: ${{ runner.temp }}/repository/packages/${{ matrix.arch }}/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: repository-*
          path: public
      - name: Assemble and verify repository
        run: |
          mkdir public/edge
          mv public/repository-x86_64 public/edge/x86_64
          mv public/repository-aarch64 public/edge/aarch64
          cp keys/apkbuilds.rsa.pub public/
          test -s public/edge/x86_64/APKINDEX.tar.gz
          test -s public/edge/aarch64/APKINDEX.tar.gz
          test -n "$(find public/edge/x86_64 -name 'gnupg-*.apk' -print -quit)"
          test -n "$(find public/edge/aarch64 -name 'gnupg-*.apk' -print -quit)"
      - uses: actions/upload-pages-artifact@v4
        with:
          path: public
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  test-pages:
    needs: publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Test exact-version installation from Pages
        run: |
          version=$(sed -n 's/^pkgver=//p' packages/gnupg/APKBUILD)
          revision=$(sed -n 's/^pkgrel=//p' packages/gnupg/APKBUILD)
          package_tag="$version-r$revision"
          docker run --rm \
            -e PACKAGE_TAG="$package_tag" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            alpine:edge sh -euxc '
              apk add gnupg
              wget -q https://angribot.github.io/apkbuilds/apkbuilds.rsa.pub -O /etc/apk/keys/apkbuilds.rsa.pub
              echo "https://angribot.github.io/apkbuilds/edge" >> /etc/apk/repositories
              ready=false
              for delay in 0 5 10 20 40 60; do
                sleep "$delay"
                if apk update && apk policy gnupg | grep -F "$PACKAGE_TAG"; then
                  ready=true
                  break
                fi
              done
              test "$ready" = true
              apk add --upgrade "gnupg=$PACKAGE_TAG"
              apk info -e "gnupg=$PACKAGE_TAG"
              scripts/test-package.sh "${PACKAGE_TAG%-r*}"
            '
