name: Publish

on:
  workflow_dispatch:
    inputs:
      bootstrap:
        description: Create repository without a verified published baseline
        type: boolean
        default: false
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read

env:
  HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

concurrency:
  group: publish

jobs:
  scope:
    if: >-
      (github.event_name == 'workflow_dispatch' &&
      github.ref_name == github.event.repository.default_branch &&
      inputs.bootstrap == true) ||
      (github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.event == 'push' ||
      github.event.workflow_run.event == 'workflow_dispatch') &&
      github.event.workflow_run.head_sha == github.sha)
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.changes.outputs.publish }}
      gnupg: ${{ steps.changes.outputs.gnupg }}
      zerostack: ${{ steps.changes.outputs.zerostack }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ env.HEAD_SHA }}
          fetch-depth: 0
      - name: Select publication scope
        id: changes
        env:
          BOOTSTRAP: ${{ inputs.bootstrap }}
          HEAD_SHA: ${{ env.HEAD_SHA }}
        run: |
          origins='[]'
          if [ "$BOOTSTRAP" = true ]; then
            origins='["gnupg","zerostack"]'
          else
            deployed=$(curl --connect-timeout 15 --max-time 60 --retry 3 \
              --retry-connrefused -fsSL \
              "https://angribot.github.io/apkbuilds/commit?run=$GITHUB_RUN_ID")
            [[ "$deployed" =~ ^[0-9a-f]{40}$ ]] || {
              echo 'published commit marker is invalid; use bootstrap only for first publication' >&2
              exit 1
            }
            git merge-base --is-ancestor "$deployed" "$HEAD_SHA" || {
              echo 'published commit is not an ancestor of this release' >&2
              exit 1
            }
            files=$(git diff --name-only --no-renames "$deployed" "$HEAD_SHA")
            if printf '%s\n' "$files" | grep -Fxq 'keys/apkbuilds.rsa.pub'; then
              echo 'release key changes require a separate key-rotation migration' >&2
              exit 1
            fi
            origins=$(printf '%s\n' "$files" | python3 scripts/repository.py scope)
            for origin in gnupg zerostack; do
              printf '%s\n' "$origins" | grep -Fq "\"$origin\"" || continue
              previous="$RUNNER_TEMP/$origin-APKBUILD"
              git show "$deployed:packages/$origin/APKBUILD" > "$previous"
              python3 scripts/repository.py verify-pkgrel \
                --previous "$previous" \
                --current "packages/$origin/APKBUILD"
            done
          fi
          publish=false
          gnupg=false
          zerostack=false
          if printf '%s\n' "$origins" | grep -Fq '"gnupg"'; then
            publish=true
            gnupg=true
          fi
          if printf '%s\n' "$origins" | grep -Fq '"zerostack"'; then
            publish=true
            zerostack=true
          fi
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "gnupg=$gnupg" >> "$GITHUB_OUTPUT"
          echo "zerostack=$zerostack" >> "$GITHUB_OUTPUT"

  build:
    needs: scope
    if: needs.scope.outputs.publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ env.HEAD_SHA }}
      - name: Build changed packages with an ephemeral key
        env:
          BUILD_GNUPG: ${{ needs.scope.outputs.gnupg }}
          BUILD_ZEROSTACK: ${{ needs.scope.outputs.zerostack }}
        run: |
          mkdir -p "$RUNNER_TEMP/repository/packages/${{ matrix.arch }}" "$RUNNER_TEMP/new"
          docker run --rm \
            -e BOOTSTRAP="${{ inputs.bootstrap }}" \
            -e BUILD_GNUPG \
            -e BUILD_ZEROSTACK \
            -e REPOSITORY_URL="https://angribot.github.io/apkbuilds/edge/${{ matrix.arch }}" \
            -e TARGET_ARCH="${{ matrix.arch }}" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v "$RUNNER_TEMP/repository:/repository" \
            -v "$RUNNER_TEMP/new:/new" \
            -w /workspace \
            alpine:edge sh -euxc '
              apk add --no-cache alpine-sdk curl python3
              download() {
                curl --connect-timeout 15 --max-time 120 --retry 3 \
                  --retry-connrefused -fsSL "$1" -o "$2"
              }
              adduser -D builder
              addgroup builder abuild
              mkdir -p /etc/doas.d
              echo "permit nopass builder as root" > /etc/doas.d/builder.conf
              chown -R builder:builder /new /repository /workspace
              repository="/repository/packages/$TARGET_ARCH"
              previous_index=
              if [ "$BOOTSTRAP" != true ]; then
                previous_index=/tmp/previous-index.tar.gz
                cp /workspace/keys/apkbuilds.rsa.pub /etc/apk/keys/
                download "$REPOSITORY_URL/APKINDEX.tar.gz" "$previous_index"
                apk verify "$previous_index"
                set -- --index "$previous_index"
                [ "$BUILD_GNUPG" = true ] && set -- "$@" --origin gnupg
                [ "$BUILD_ZEROSTACK" = true ] && set -- "$@" --origin zerostack
                python3 /workspace/scripts/repository.py retained "$@" > /tmp/retained-packages
                while IFS= read -r package; do
                  download "$REPOSITORY_URL/$package" "$repository/$package"
                done < /tmp/retained-packages
                if [ -s /tmp/retained-packages ]; then
                  apk verify "$repository"/*.apk
                  apk index --no-warnings --quiet \
                    --output /tmp/retained-index.tar.gz \
                    --rewrite-arch "$TARGET_ARCH" \
                    "$repository"/*.apk
                  set -- --previous-index "$previous_index" \
                    --retained-index /tmp/retained-index.tar.gz
                  [ "$BUILD_GNUPG" = true ] && set -- "$@" --origin gnupg
                  [ "$BUILD_ZEROSTACK" = true ] && set -- "$@" --origin zerostack
                  python3 /workspace/scripts/repository.py verify-retained "$@"
                fi
              fi
              su builder -c "abuild-keygen -a -n"
              cp /home/builder/.config/abuild/*.rsa.pub /etc/apk/keys/
              if [ "$BUILD_GNUPG" = true ]; then
                su builder -c "cd /workspace/packages/gnupg && REPODEST=/new abuild -r"
              fi
              if [ "$BUILD_ZEROSTACK" = true ]; then
                su builder -c "cd /workspace/packages/zerostack && REPODEST=/new abuild -r"
              fi
              new_packages="/new/packages/$TARGET_ARCH"
              test -n "$(find "$new_packages" -name "*.apk" -print -quit)"
              apk verify "$new_packages"/*.apk
              apk index --no-warnings --quiet \
                --output /tmp/new-index.tar.gz \
                --rewrite-arch "$TARGET_ARCH" \
                "$new_packages"/*.apk
              set -- --built-index /tmp/new-index.tar.gz
              [ -n "$previous_index" ] && set -- --previous-index "$previous_index" "$@"
              [ "$BUILD_GNUPG" = true ] && set -- "$@" --origin gnupg
              [ "$BUILD_ZEROSTACK" = true ] && set -- "$@" --origin zerostack
              python3 /workspace/scripts/repository.py replacements "$@" > /tmp/replacements
              while IFS="$(printf "\\t")" read -r package new old; do
                test "$(apk version -t "$new" "$old")" = ">" || {
                  echo "$package must increase version: $old -> $new" >&2
                  exit 1
                }
              done < /tmp/replacements
              for package in "$new_packages"/*.apk; do basename "$package"; done | sort > "$repository/new-packages.txt"
              test -s "$repository/new-packages.txt"
              while IFS= read -r package; do
                cp "$new_packages/$package" "$repository/$package"
              done < "$repository/new-packages.txt"
              apk index --no-warnings --quiet \
                --output "$repository/APKINDEX.tar.gz" \
                --rewrite-arch "$TARGET_ARCH" \
                "$repository"/*.apk
            '
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: staged-repository-${{ matrix.arch }}
          path: ${{ runner.temp }}/repository/packages/${{ matrix.arch }}/
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  sign:
    needs: [scope, build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    environment: release
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ env.HEAD_SHA }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: staged-repository-${{ matrix.arch }}
          path: ${{ runner.temp }}/repository/${{ matrix.arch }}
      - name: Read package versions
        run: |
          echo "GNUPG_PACKAGE_VERSION=$(sed -n 's/^pkgver=//p' packages/gnupg/APKBUILD)-r$(sed -n 's/^pkgrel=//p' packages/gnupg/APKBUILD)" >> "$GITHUB_ENV"
          echo "ZEROSTACK_PACKAGE_VERSION=$(sed -n 's/^pkgver=//p' packages/zerostack/APKBUILD)-r$(sed -n 's/^pkgrel=//p' packages/zerostack/APKBUILD)" >> "$GITHUB_ENV"
      - name: Test staged packages with the repository read-only
        run: |
          docker run --rm \
            -e GNUPG_PACKAGE_VERSION \
            -e ZEROSTACK_PACKAGE_VERSION \
            -e BUILD_GNUPG="${{ needs.scope.outputs.gnupg }}" \
            -e BUILD_ZEROSTACK="${{ needs.scope.outputs.zerostack }}" \
            -v "$RUNNER_TEMP/repository:/repository:ro" \
            -v "$GITHUB_WORKSPACE:/workspace:ro" \
            -w /workspace \
            alpine:edge sh -euxc '
              set -- apk add --allow-untrusted --repository /repository
              if [ "$BUILD_GNUPG" = true ]; then
                set -- "$@" "gnupg=$GNUPG_PACKAGE_VERSION"
              fi
              if [ "$BUILD_ZEROSTACK" = true ]; then
                set -- "$@" "zerostack=$ZEROSTACK_PACKAGE_VERSION"
              fi
              "$@"
              if [ "$BUILD_GNUPG" = true ]; then
                scripts/test-package.sh "${GNUPG_PACKAGE_VERSION%-r*}"
              fi
              if [ "$BUILD_ZEROSTACK" = true ]; then
                test "$(zerostack --version)" = \
                  "zerostack ${ZEROSTACK_PACKAGE_VERSION%-r*}"
              fi
            '
      - name: Prepare isolated signer
        run: |
          docker build --tag apkbuilds-signer - <<'EOF'
          FROM alpine:edge
          RUN apk add --no-cache abuild
          EOF
      - name: Sign repository without network access
        env:
          ABUILD_PRIVATE_KEY: ${{ secrets.ABUILD_PRIVATE_KEY }}
        run: |
          docker run --rm --network none \
            -e ABUILD_PRIVATE_KEY \
            -e TARGET_ARCH="${{ matrix.arch }}" \
            -v "$RUNNER_TEMP/repository:/repository" \
            -v "$GITHUB_WORKSPACE/keys/apkbuilds.rsa.pub:/keys/apkbuilds.rsa.pub:ro" \
            apkbuilds-signer sh -euxc '
              umask 077
              set +x
              printf "%s\n" "$ABUILD_PRIVATE_KEY" > /tmp/apkbuilds.rsa
              unset ABUILD_PRIVATE_KEY
              set -x
              trap "rm -f /tmp/apkbuilds.rsa" EXIT
              cp /keys/apkbuilds.rsa.pub /etc/apk/keys/
              repository="/repository/$TARGET_ARCH"
              test -s "$repository/new-packages.txt"
              while IFS= read -r filename; do
                package="$repository/$filename"
                test -f "$package"
                work=$(mktemp -d)
                (
                  cd "$work"
                  abuild-gzsplit < "$package"
                  abuild-sign -q -t RSA256 \
                    -k /tmp/apkbuilds.rsa \
                    -p /keys/apkbuilds.rsa.pub \
                    control.tar.gz
                  cat control.tar.gz data.tar.gz > "$package"
                )
                rm -rf "$work"
              done < "$repository/new-packages.txt"
              rm -f "$repository/new-packages.txt"
              cd "$repository"
              rm -f APKINDEX.tar.gz Packages.adb
              apk index --no-warnings --quiet \
                --output APKINDEX.tar.gz \
                --rewrite-arch "$TARGET_ARCH" \
                ./*.apk
              abuild-sign -q -t RSA256 \
                -k /tmp/apkbuilds.rsa \
                -p /keys/apkbuilds.rsa.pub \
                APKINDEX.tar.gz
            '
      - name: Verify signed packages without the private key
        run: |
          docker run --rm \
            -e GNUPG_PACKAGE_VERSION \
            -e ZEROSTACK_PACKAGE_VERSION \
            -e BUILD_GNUPG="${{ needs.scope.outputs.gnupg }}" \
            -e BUILD_ZEROSTACK="${{ needs.scope.outputs.zerostack }}" \
            -v "$RUNNER_TEMP/repository:/repository:ro" \
            -v "$GITHUB_WORKSPACE:/workspace:ro" \
            -w /workspace \
            alpine:edge sh -euxc '
              cp keys/apkbuilds.rsa.pub /etc/apk/keys/
              set -- apk add --repository /repository
              if [ "$BUILD_GNUPG" = true ]; then
                set -- "$@" "gnupg=$GNUPG_PACKAGE_VERSION"
              fi
              if [ "$BUILD_ZEROSTACK" = true ]; then
                set -- "$@" "zerostack=$ZEROSTACK_PACKAGE_VERSION"
              fi
              "$@"
              if [ "$BUILD_GNUPG" = true ]; then
                scripts/test-package.sh "${GNUPG_PACKAGE_VERSION%-r*}"
              fi
              if [ "$BUILD_ZEROSTACK" = true ]; then
                test "$(zerostack --version)" = \
                  "zerostack ${ZEROSTACK_PACKAGE_VERSION%-r*}"
              fi
            '
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: repository-${{ matrix.arch }}
          path: ${{ runner.temp }}/repository/${{ matrix.arch }}/
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  publish:
    needs: sign
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ env.HEAD_SHA }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: repository-*
          path: public
      - name: Assemble and verify repository
        run: |
          mkdir public/edge
          mv public/repository-x86_64 public/edge/x86_64
          mv public/repository-aarch64 public/edge/aarch64
          cp keys/apkbuilds.rsa.pub public/
          printf '%s\n' '${{ env.HEAD_SHA }}' > public/commit
          test -s public/edge/x86_64/APKINDEX.tar.gz
          test -s public/edge/aarch64/APKINDEX.tar.gz
          test -n "$(find public/edge/x86_64 -name 'gnupg-*.apk' -print -quit)"
          test -n "$(find public/edge/aarch64 -name 'gnupg-*.apk' -print -quit)"
          test -n "$(find public/edge/x86_64 -name 'zerostack-*.apk' -print -quit)"
          test -n "$(find public/edge/aarch64 -name 'zerostack-*.apk' -print -quit)"
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: public
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

  test-pages:
    needs: [scope, publish]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ env.HEAD_SHA }}
      - name: Test changed package exact-version installation from Pages
        run: |
          gnupg_version=$(sed -n 's/^pkgver=//p' packages/gnupg/APKBUILD)
          gnupg_revision=$(sed -n 's/^pkgrel=//p' packages/gnupg/APKBUILD)
          zerostack_version=$(sed -n 's/^pkgver=//p' packages/zerostack/APKBUILD)
          zerostack_revision=$(sed -n 's/^pkgrel=//p' packages/zerostack/APKBUILD)
          docker run --rm \
            -e GNUPG_PACKAGE_VERSION="$gnupg_version-r$gnupg_revision" \
            -e ZEROSTACK_PACKAGE_VERSION="$zerostack_version-r$zerostack_revision" \
            -e BUILD_GNUPG="${{ needs.scope.outputs.gnupg }}" \
            -e BUILD_ZEROSTACK="${{ needs.scope.outputs.zerostack }}" \
            -e PUBLISHED_SHA="${{ env.HEAD_SHA }}" \
            -e RUN_ID="${{ github.run_id }}" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            alpine:edge sh -euxc '
              wget -q -T 15 -t 4 https://angribot.github.io/apkbuilds/apkbuilds.rsa.pub -O /etc/apk/keys/apkbuilds.rsa.pub
              echo "https://angribot.github.io/apkbuilds/edge" >> /etc/apk/repositories
              ready=false
              for delay in 0 5 10 20 40 60; do
                sleep "$delay"
                if [ "$(wget -q -T 15 -t 4 -O- "https://angribot.github.io/apkbuilds/commit?run=$RUN_ID")" = "$PUBLISHED_SHA" ]; then
                  ready=true
                  break
                fi
              done
              test "$ready" = true
              apk update
              set -- apk add
              if [ "$BUILD_GNUPG" = true ]; then
                set -- "$@" "gnupg=$GNUPG_PACKAGE_VERSION"
              fi
              if [ "$BUILD_ZEROSTACK" = true ]; then
                set -- "$@" "zerostack=$ZEROSTACK_PACKAGE_VERSION"
              fi
              "$@"
              if [ "$BUILD_GNUPG" = true ]; then
                apk info -e "gpg=$GNUPG_PACKAGE_VERSION"
                apk info -e "gnupg=$GNUPG_PACKAGE_VERSION"
                scripts/test-package.sh "${GNUPG_PACKAGE_VERSION%-r*}"
              fi
              if [ "$BUILD_ZEROSTACK" = true ]; then
                apk info -e "zerostack=$ZEROSTACK_PACKAGE_VERSION"
                test "$(zerostack --version)" = \
                  "zerostack ${ZEROSTACK_PACKAGE_VERSION%-r*}"
              fi
            '
