name: Publish

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  build:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_sha == github.sha
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Build with an ephemeral key
        run: |
          mkdir -p "$RUNNER_TEMP/repository"
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v "$RUNNER_TEMP/repository:/repository" \
            -w /workspace \
            alpine:edge sh -euxc '
              apk add alpine-sdk
              adduser -D builder
              addgroup builder abuild
              mkdir -p /etc/doas.d
              echo "permit nopass builder as root" > /etc/doas.d/builder.conf
              chown -R builder:builder /repository /workspace
              su builder -c "abuild-keygen -a -n"
              cp /home/builder/.config/abuild/*.rsa.pub /etc/apk/keys/
              su builder -c "cd /workspace/packages/gnupg && REPODEST=/repository abuild -r"
              su builder -c "cd /workspace/packages/zerostack && REPODEST=/repository abuild -r"
            '
      - uses: actions/upload-artifact@v4
        with:
          name: staged-repository-${{ matrix.arch }}
          path: ${{ runner.temp }}/repository/packages/${{ matrix.arch }}/
          if-no-files-found: error

  sign:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/download-artifact@v4
        with:
          name: staged-repository-${{ matrix.arch }}
          path: ${{ runner.temp }}/repository/${{ matrix.arch }}
      - name: Read package versions
        run: |
          echo "GNUPG_PACKAGE_VERSION=$(sed -n 's/^pkgver=//p' packages/gnupg/APKBUILD)-r$(sed -n 's/^pkgrel=//p' packages/gnupg/APKBUILD)" >> "$GITHUB_ENV"
          echo "ZEROSTACK_PACKAGE_VERSION=$(sed -n 's/^pkgver=//p' packages/zerostack/APKBUILD)-r$(sed -n 's/^pkgrel=//p' packages/zerostack/APKBUILD)" >> "$GITHUB_ENV"
      - name: Test staged packages with the repository read-only
        run: |
          docker run --rm \
            -e GNUPG_PACKAGE_VERSION \
            -e ZEROSTACK_PACKAGE_VERSION \
            -v "$RUNNER_TEMP/repository:/repository:ro" \
            -v "$GITHUB_WORKSPACE:/workspace:ro" \
            -w /workspace \
            alpine:edge sh -euxc '
              apk add --allow-untrusted --repository /repository \
                "gnupg=$GNUPG_PACKAGE_VERSION" \
                "zerostack=$ZEROSTACK_PACKAGE_VERSION"
              scripts/test-package.sh "${GNUPG_PACKAGE_VERSION%-r*}"
              test "$(zerostack --version)" = \
                "zerostack ${ZEROSTACK_PACKAGE_VERSION%-r*}"
            '
      - name: Prepare isolated signer
        run: |
          docker build --tag apkbuilds-signer - <<'EOF'
          FROM alpine:edge
          RUN apk add --no-cache abuild
          EOF
      - name: Sign repository without network access
        env:
          ABUILD_PRIVATE_KEY: ${{ secrets.ABUILD_PRIVATE_KEY }}
        run: |
          docker run --rm --network none \
            -e ABUILD_PRIVATE_KEY \
            -e TARGET_ARCH="${{ matrix.arch }}" \
            -v "$RUNNER_TEMP/repository:/repository" \
            -v "$GITHUB_WORKSPACE/keys/apkbuilds.rsa.pub:/keys/apkbuilds.rsa.pub:ro" \
            apkbuilds-signer sh -euxc '
              umask 077
              set +x
              printf "%s\n" "$ABUILD_PRIVATE_KEY" > /tmp/apkbuilds.rsa
              unset ABUILD_PRIVATE_KEY
              set -x
              trap "rm -f /tmp/apkbuilds.rsa" EXIT
              cp /keys/apkbuilds.rsa.pub /etc/apk/keys/
              repository="/repository/$TARGET_ARCH"
              for package in "$repository"/*.apk; do
                work=$(mktemp -d)
                (
                  cd "$work"
                  abuild-gzsplit < "$package"
                  abuild-sign -q \
                    -k /tmp/apkbuilds.rsa \
                    -p /keys/apkbuilds.rsa.pub \
                    control.tar.gz
                  cat control.tar.gz data.tar.gz > "$package"
                )
                rm -rf "$work"
              done
              cd "$repository"
              rm -f APKINDEX.tar.gz Packages.adb
              apk index --no-warnings --quiet \
                --output APKINDEX.tar.gz \
                --rewrite-arch "$TARGET_ARCH" \
                ./*.apk
              abuild-sign -q \
                -k /tmp/apkbuilds.rsa \
                -p /keys/apkbuilds.rsa.pub \
                APKINDEX.tar.gz
            '
      - name: Verify signed packages without the private key
        run: |
          docker run --rm \
            -e GNUPG_PACKAGE_VERSION \
            -e ZEROSTACK_PACKAGE_VERSION \
            -v "$RUNNER_TEMP/repository:/repository:ro" \
            -v "$GITHUB_WORKSPACE:/workspace:ro" \
            -w /workspace \
            alpine:edge sh -euxc '
              cp keys/apkbuilds.rsa.pub /etc/apk/keys/
              apk add --repository /repository \
                "gnupg=$GNUPG_PACKAGE_VERSION" \
                "zerostack=$ZEROSTACK_PACKAGE_VERSION"
              scripts/test-package.sh "${GNUPG_PACKAGE_VERSION%-r*}"
              test "$(zerostack --version)" = \
                "zerostack ${ZEROSTACK_PACKAGE_VERSION%-r*}"
            '
      - uses: actions/upload-artifact@v4
        with:
          name: repository-${{ matrix.arch }}
          path: ${{ runner.temp }}/repository/${{ matrix.arch }}/
          if-no-files-found: error

  publish:
    needs: sign
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/download-artifact@v4
        with:
          pattern: repository-*
          path: public
      - name: Assemble and verify repository
        run: |
          mkdir public/edge
          mv public/repository-x86_64 public/edge/x86_64
          mv public/repository-aarch64 public/edge/aarch64
          cp keys/apkbuilds.rsa.pub public/
          printf '%s\n' '${{ github.event.workflow_run.head_sha }}' > public/commit
          test -s public/edge/x86_64/APKINDEX.tar.gz
          test -s public/edge/aarch64/APKINDEX.tar.gz
          test -n "$(find public/edge/x86_64 -name 'gnupg-*.apk' -print -quit)"
          test -n "$(find public/edge/aarch64 -name 'gnupg-*.apk' -print -quit)"
          test -n "$(find public/edge/x86_64 -name 'zerostack-*.apk' -print -quit)"
          test -n "$(find public/edge/aarch64 -name 'zerostack-*.apk' -print -quit)"
      - uses: actions/upload-pages-artifact@v4
        with:
          path: public
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  test-pages:
    needs: publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Test exact-version installation from Pages
        run: |
          gnupg_version=$(sed -n 's/^pkgver=//p' packages/gnupg/APKBUILD)
          gnupg_revision=$(sed -n 's/^pkgrel=//p' packages/gnupg/APKBUILD)
          zerostack_version=$(sed -n 's/^pkgver=//p' packages/zerostack/APKBUILD)
          zerostack_revision=$(sed -n 's/^pkgrel=//p' packages/zerostack/APKBUILD)
          docker run --rm \
            -e GNUPG_PACKAGE_VERSION="$gnupg_version-r$gnupg_revision" \
            -e ZEROSTACK_PACKAGE_VERSION="$zerostack_version-r$zerostack_revision" \
            -e PUBLISHED_SHA="${{ github.event.workflow_run.head_sha }}" \
            -e RUN_ID="${{ github.run_id }}" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            alpine:edge sh -euxc '
              apk add gnupg
              wget -q https://angribot.github.io/apkbuilds/apkbuilds.rsa.pub -O /etc/apk/keys/apkbuilds.rsa.pub
              echo "https://angribot.github.io/apkbuilds/edge" >> /etc/apk/repositories
              ready=false
              for delay in 0 5 10 20 40 60; do
                sleep "$delay"
                if [ "$(wget -qO- "https://angribot.github.io/apkbuilds/commit?run=$RUN_ID")" = "$PUBLISHED_SHA" ]; then
                  ready=true
                  break
                fi
              done
              test "$ready" = true
              apk update
              repository="https://angribot.github.io/apkbuilds/edge/$(apk --print-arch)"
              wget -q "$repository/gpg-$GNUPG_PACKAGE_VERSION.apk?run=$RUN_ID" -O /tmp/gpg.apk
              wget -q "$repository/gnupg-$GNUPG_PACKAGE_VERSION.apk?run=$RUN_ID" -O /tmp/gnupg.apk
              wget -q "$repository/zerostack-$ZEROSTACK_PACKAGE_VERSION.apk?run=$RUN_ID" -O /tmp/zerostack.apk
              apk add --upgrade /tmp/gpg.apk /tmp/gnupg.apk /tmp/zerostack.apk
              apk info -e "gpg=$GNUPG_PACKAGE_VERSION"
              apk info -e "gnupg=$GNUPG_PACKAGE_VERSION"
              apk info -e "zerostack=$ZEROSTACK_PACKAGE_VERSION"
              scripts/test-package.sh "${GNUPG_PACKAGE_VERSION%-r*}"
              test "$(zerostack --version)" = \
                "zerostack ${ZEROSTACK_PACKAGE_VERSION%-r*}"
            '
