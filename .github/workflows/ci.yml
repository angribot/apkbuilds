name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  test-updater:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m unittest discover -s tests
      - run: python3 scripts/update.py --check

  build:
    if: github.event_name != 'push' || github.ref_name != 'main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    container: alpine:edge
    steps:
      - name: Check out repository
        run: |
          apk add git
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          git fetch --depth=1 origin "$GITHUB_REF"
          git checkout --detach FETCH_HEAD
      - name: Prepare builder
        run: |
          apk add alpine-sdk
          adduser -D builder
          addgroup builder abuild
          mkdir -p /etc/doas.d
          echo 'permit nopass builder as root' > /etc/doas.d/builder.conf
          chown -R builder:builder "$GITHUB_WORKSPACE"
          su builder -c 'abuild-keygen -a -n'
          cp /home/builder/.config/abuild/*.rsa.pub /etc/apk/keys/
      - name: Build
        run: su builder -c "cd '$GITHUB_WORKSPACE/packages/gnupg' && abuild -r"
      - name: Install and test
        run: |
          repository=/home/builder/.local/share/abuild/packages
          version=$(sed -n 's/^pkgver=//p' packages/gnupg/APKBUILD)
          revision=$(sed -n 's/^pkgrel=//p' packages/gnupg/APKBUILD)
          apk add --repository "$repository" "gnupg=$version-r$revision"
          scripts/test-package.sh "$version"

  merge-update:
    if: github.event_name == 'workflow_dispatch' && startsWith(github.ref_name, 'update/gnupg-')
    needs: [test-updater, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - run: gh pr merge --repo "$GITHUB_REPOSITORY" --squash --delete-branch "$GITHUB_REF_NAME"
