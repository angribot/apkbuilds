name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["**.md"]
  pull_request:
    paths-ignore: ["**.md"]
  workflow_dispatch:
    inputs:
      build:
        description: Build packages
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  test-updater:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.scope.outputs.build }}
      gnupg: ${{ steps.scope.outputs.gnupg }}
      zerostack: ${{ steps.scope.outputs.zerostack }}
      package_gnupg: ${{ steps.scope.outputs.package_gnupg }}
      package_zerostack: ${{ steps.scope.outputs.package_zerostack }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - run: python3 -m unittest discover -s tests
      - if: ${{ !startsWith(github.head_ref || github.ref_name, 'update/zerostack-') }}
        run: python3 scripts/update.py --check
      - if: ${{ !startsWith(github.head_ref || github.ref_name, 'update/gnupg-') }}
        run: python3 scripts/update-zerostack.py --check
      - name: Select build scope
        id: scope
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          BUILD_REQUESTED: ${{ inputs.build }}
        run: |
          files=
          version_base=
          build=false
          gnupg=false
          zerostack=false
          package_gnupg=false
          package_zerostack=false
          case "$GITHUB_EVENT_NAME" in
            pull_request)
              version_base=$PR_BASE_SHA
              files=$(git diff --name-only --no-renames \
                "$version_base...$PR_HEAD_SHA")
              ;;
            push)
              if [ "$PUSH_BEFORE" != 0000000000000000000000000000000000000000 ]; then
                version_base=$PUSH_BEFORE
                files=$(git diff --name-only --no-renames \
                  "$version_base...$GITHUB_SHA")
              fi
              ;;
            workflow_dispatch)
              case "$GITHUB_REF_NAME" in
                update/gnupg-*|update/zerostack-*)
                  version_base="origin/$DEFAULT_BRANCH"
                  files=$(git diff --name-only --no-renames \
                    "$version_base...$GITHUB_SHA")
                  ;;
                *)
                  if [ "$BUILD_REQUESTED" != false ]; then
                    gnupg=true
                    zerostack=true
                  fi
                  ;;
              esac
              ;;
          esac
          if [ -n "$files" ]; then
            origins=$(printf '%s\n' "$files" | python3 scripts/repository.py scope)
            if printf '%s\n' "$origins" | grep -Fq '"gnupg"'; then
              gnupg=true
              package_gnupg=true
            fi
            if printf '%s\n' "$origins" | grep -Fq '"zerostack"'; then
              zerostack=true
              package_zerostack=true
            fi
            if printf '%s\n' "$files" | grep -Eq '^scripts/test-package\.sh$'; then
              gnupg=true
            fi
          fi
          if [ "$gnupg" = true ] || [ "$zerostack" = true ]; then
            build=true
          fi
          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "gnupg=$gnupg" >> "$GITHUB_OUTPUT"
          echo "zerostack=$zerostack" >> "$GITHUB_OUTPUT"
          echo "package_gnupg=$package_gnupg" >> "$GITHUB_OUTPUT"
          echo "package_zerostack=$package_zerostack" >> "$GITHUB_OUTPUT"
          echo "version_base=$version_base" >> "$GITHUB_OUTPUT"
      - name: Enforce package version semantics
        if: >-
          steps.scope.outputs.package_gnupg == 'true' ||
          steps.scope.outputs.package_zerostack == 'true'
        env:
          VERSION_BASE: ${{ steps.scope.outputs.version_base }}
          PACKAGE_GNUPG: ${{ steps.scope.outputs.package_gnupg }}
          PACKAGE_ZEROSTACK: ${{ steps.scope.outputs.package_zerostack }}
        run: |
          test -n "$VERSION_BASE"
          for origin in gnupg zerostack; do
            case "$origin" in
              gnupg) selected=$PACKAGE_GNUPG ;;
              zerostack) selected=$PACKAGE_ZEROSTACK ;;
            esac
            [ "$selected" = true ] || continue
            previous="$RUNNER_TEMP/$origin-APKBUILD"
            git show "$VERSION_BASE:packages/$origin/APKBUILD" > "$previous"
            python3 scripts/repository.py verify-pkgrel \
              --previous "$previous" \
              --current "packages/$origin/APKBUILD"
          done

  build:
    needs: test-updater
    if: needs.test-updater.outputs.build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    container: alpine:edge
    steps:
      - name: Check out repository
        run: |
          apk add git
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          git fetch --depth=1 origin "$GITHUB_REF"
          git checkout --detach FETCH_HEAD
      - name: Prepare builder
        run: |
          apk add alpine-sdk
          adduser -D builder
          addgroup builder abuild
          mkdir -p /etc/doas.d
          echo 'permit nopass builder as root' > /etc/doas.d/builder.conf
          chown -R builder:builder "$GITHUB_WORKSPACE"
          su builder -c 'abuild-keygen -a -n'
          cp /home/builder/.config/abuild/*.rsa.pub /etc/apk/keys/
      - name: Build GnuPG
        if: needs.test-updater.outputs.gnupg == 'true'
        run: su builder -c "cd '$GITHUB_WORKSPACE/packages/gnupg' && abuild -r"
      - name: Build zerostack
        if: needs.test-updater.outputs.zerostack == 'true'
        run: su builder -c "cd '$GITHUB_WORKSPACE/packages/zerostack' && abuild -r"
      - name: Verify replacement versions
        if: >-
          needs.test-updater.outputs.package_gnupg == 'true' ||
          needs.test-updater.outputs.package_zerostack == 'true'
        env:
          PACKAGE_GNUPG: ${{ needs.test-updater.outputs.package_gnupg }}
          PACKAGE_ZEROSTACK: ${{ needs.test-updater.outputs.package_zerostack }}
        run: |
          cp keys/apkbuilds.rsa.pub /etc/apk/keys/
          previous=/tmp/previous-index.tar.gz
          wget -q -T 15 -t 4 "https://angribot.github.io/apkbuilds/edge/${{ matrix.arch }}/APKINDEX.tar.gz" -O "$previous"
          apk verify "$previous"
          repository=/home/builder/.local/share/abuild/packages
          mkdir /tmp/new-packages
          find "$repository" -type f -name '*.apk' -exec cp {} /tmp/new-packages/ \;
          test -n "$(find /tmp/new-packages -name '*.apk' -print -quit)"
          apk index --no-warnings --quiet \
            --output /tmp/new-index.tar.gz \
            --rewrite-arch "${{ matrix.arch }}" \
            /tmp/new-packages/*.apk
          set -- --previous-index "$previous" --built-index /tmp/new-index.tar.gz
          [ "$PACKAGE_GNUPG" = true ] && set -- "$@" --origin gnupg
          [ "$PACKAGE_ZEROSTACK" = true ] && set -- "$@" --origin zerostack
          python3 scripts/repository.py replacements "$@" > /tmp/replacements
          while IFS="$(printf '\t')" read -r package new old; do
            test "$(apk version -t "$new" "$old")" = ">" || {
              echo "$package must increase version: $old -> $new" >&2
              exit 1
            }
          done < /tmp/replacements
      - name: Install and test GnuPG
        if: needs.test-updater.outputs.gnupg == 'true'
        run: |
          repository=/home/builder/.local/share/abuild/packages
          version=$(sed -n 's/^pkgver=//p' packages/gnupg/APKBUILD)
          revision=$(sed -n 's/^pkgrel=//p' packages/gnupg/APKBUILD)
          apk add --repository "$repository" "gnupg=$version-r$revision"
          scripts/test-package.sh "$version"
      - name: Install and test zerostack
        if: needs.test-updater.outputs.zerostack == 'true'
        run: |
          repository=/home/builder/.local/share/abuild/packages
          version=$(sed -n 's/^pkgver=//p' packages/zerostack/APKBUILD)
          revision=$(sed -n 's/^pkgrel=//p' packages/zerostack/APKBUILD)
          apk add --repository "$repository" "zerostack=$version-r$revision"
          test "$(zerostack --version)" = "zerostack $version"
