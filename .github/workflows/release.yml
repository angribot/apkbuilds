name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  prepare:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref_name == 'main') ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.release.outputs.publish }}
      ref: ${{ steps.release.outputs.ref }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(sed -n 's/^pkgver=//p' packages/gnupg/APKBUILD)
          revision=$(sed -n 's/^pkgrel=//p' packages/gnupg/APKBUILD)
          tag="$version-r$revision"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            echo publish=true >> "$GITHUB_OUTPUT"
          else
            echo publish=false >> "$GITHUB_OUTPUT"
          fi
          echo "ref=${{ github.event.workflow_run.head_sha || github.sha }}" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    if: needs.prepare.outputs.publish == 'true'
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    environment: release
    env:
      ABUILD_PRIVATE_KEY: ${{ secrets.ABUILD_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}
      - name: Build, install, and test
        env:
          PACKAGE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          mkdir -p "$RUNNER_TEMP/repository"
          docker run --rm \
            -e ABUILD_PRIVATE_KEY \
            -e PACKAGE_TAG \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v "$RUNNER_TEMP/repository:/repository" \
            -w /workspace \
            alpine:edge sh -euxc '
              apk add alpine-sdk
              adduser -D builder
              addgroup builder abuild
              mkdir -p /etc/doas.d /home/builder/.config/abuild
              echo "permit nopass builder as root" > /etc/doas.d/builder.conf
              printf "%s\n" "$ABUILD_PRIVATE_KEY" > /home/builder/.config/abuild/apkbuilds.rsa
              cp keys/apkbuilds.rsa.pub /home/builder/.config/abuild/apkbuilds.rsa.pub
              cp keys/apkbuilds.rsa.pub /etc/apk/keys/
              echo "PACKAGER_PRIVKEY=/home/builder/.config/abuild/apkbuilds.rsa" > /home/builder/.config/abuild/abuild.conf
              chmod 600 /home/builder/.config/abuild/apkbuilds.rsa
              chown -R builder:builder /home/builder/.config /repository /workspace
              su builder -c "cd /workspace/packages/gnupg && REPODEST=/repository abuild -r"
              apk add --repository /repository/packages "gnupg=$PACKAGE_TAG"
              scripts/test-package.sh "$(sed -n s/^pkgver=//p packages/gnupg/APKBUILD)"
            '
      - uses: actions/upload-artifact@v4
        with:
          name: repository-${{ matrix.arch }}
          path: ${{ runner.temp }}/repository/packages/${{ matrix.arch }}/
          if-no-files-found: error

  publish:
    if: needs.prepare.outputs.publish == 'true'
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}
      - uses: actions/download-artifact@v4
        with:
          pattern: repository-*
          path: public
      - name: Assemble and verify repository
        run: |
          mv public/repository-x86_64 public/x86_64
          mv public/repository-aarch64 public/aarch64
          cp keys/apkbuilds.rsa.pub public/
          test -s public/x86_64/APKINDEX.tar.gz
          test -s public/aarch64/APKINDEX.tar.gz
          test -n "$(find public/x86_64 -name 'gnupg-*.apk' -print -quit)"
          test -n "$(find public/aarch64 -name 'gnupg-*.apk' -print -quit)"
      - uses: actions/upload-pages-artifact@v4
        with:
          path: public
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=${{ needs.prepare.outputs.tag }}
          tar -C public -czf repository-x86_64.tar.gz x86_64
          tar -C public -czf repository-aarch64.tar.gz aarch64
          gh release delete "$tag" --cleanup-tag --yes 2>/dev/null || true
          gh release create "$tag" repository-*.tar.gz public/apkbuilds.rsa.pub --title "GnuPG $tag" --notes "Signed Alpine edge packages for x86_64 and aarch64."
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
