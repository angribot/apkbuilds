name: Update packages

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  update:
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: gnupg
            updater: scripts/update.py
            apkbuild: packages/gnupg/APKBUILD
            body: Verified against a pinned official GnuPG release-signing fingerprint.
          - package: zerostack
            updater: scripts/update-zerostack.py
            apkbuild: packages/zerostack/APKBUILD
            body: Verified both musl release assets against GitHub-provided SHA-256 digests.
    runs-on: ubuntu-latest
    env:
      PACKAGE: ${{ matrix.package }}
      UPDATER: ${{ matrix.updater }}
      APKBUILD: ${{ matrix.apkbuild }}
      PR_BODY: ${{ matrix.body }}
    steps:
      - uses: actions/checkout@v7
      - name: Check stable release
        id: update
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          version=$(python3 "$UPDATER")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          git diff --quiet -- "$APKBUILD" && echo 'changed=false' >> "$GITHUB_OUTPUT" || echo 'changed=true' >> "$GITHUB_OUTPUT"
      - name: Create update pull request
        id: create
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.update.outputs.version }}
        run: |
          branch="update/$PACKAGE-$VERSION"
          if [ "$(gh pr list --repo "$GITHUB_REPOSITORY" --state open \
            --base main --head "$branch" --json number --jq 'length')" -gt 0 ]; then
            echo "An update pull request already exists for $PACKAGE $VERSION."
            echo 'created=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git ls-remote --exit-code --heads origin "$branch" > /dev/null; then
            echo "Update branch $branch already exists."
            echo 'created=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git switch -c "$branch"
          git add "$APKBUILD"
          git commit -m "$PACKAGE: upgrade to $VERSION"
          git push origin "$branch"
          gh pr create --base main --head "$branch" --title "$PACKAGE: upgrade to $VERSION" --body "$PR_BODY"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo 'created=true' >> "$GITHUB_OUTPUT"
      - name: Validate, merge, and publish update
        if: steps.create.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.create.outputs.branch }}
          HEAD_SHA: ${{ steps.create.outputs.head_sha }}
        run: |
          gh workflow run ci.yml --repo "$GITHUB_REPOSITORY" --ref "$BRANCH"
          run_id=
          for _ in $(seq 1 30); do
            run_id=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow ci.yml \
              --branch "$BRANCH" --event workflow_dispatch --limit 1 \
              --json databaseId --jq '.[0].databaseId // empty')
            [ -n "$run_id" ] && break
            sleep 2
          done
          test -n "$run_id"
          gh run watch "$run_id" --repo "$GITHUB_REPOSITORY" --exit-status
          case "$BRANCH" in
            update/gnupg-*) expected=packages/gnupg/APKBUILD ;;
            update/zerostack-*) expected=packages/zerostack/APKBUILD ;;
            *) exit 1 ;;
          esac
          pr=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open \
            --base main --head "$BRANCH" \
            --json number,author,headRefOid,isCrossRepository,files)
          jq -e --arg sha "$HEAD_SHA" --arg path "$expected" '
            length == 1 and
            .[0].author.login == "app/github-actions" and
            .[0].headRefOid == $sha and
            (.[0].isCrossRepository | not) and
            (.[0].files | length == 1) and
            .[0].files[0].path == $path
          ' <<< "$pr" > /dev/null
          number=$(printf '%s' "$pr" | jq -r '.[0].number')
          gh pr merge --repo "$GITHUB_REPOSITORY" "$number" --squash --delete-branch
          gh workflow run publish.yml --repo "$GITHUB_REPOSITORY" --ref main
